name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx biome check --reporter=github .

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        app: [site]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build ${{ matrix.app }}
        run: npm run build -w @bdc/${{ matrix.app }}

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: apps/${{ matrix.app }}/dist

  a11y:
    name: Accessibility
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: apps/site/dist

      - name: Accessibility audit
        working-directory: apps/site
        run: |
          npx astro preview &
          npx wait-on http://localhost:4321
          npx pa11y-ci --sitemap http://localhost:4321/sitemap-0.xml --sitemap-find https://biodatacatalyst.nhlbi.nih.gov --sitemap-replace http://localhost:4321
